<!DOCTYPE html>
<html>
<head>

<title>Golden State RP DMV Portal</title>

<link rel="stylesheet" href="css/style.css">

<script defer src="js/app.js"></script>

</head>

<body>

<header>

<img src="images/logo.png">

<h2>Golden State RP DMV System</h2>

</header>


<nav>

<button onclick="openModule('dashboard')">Home</button>

<button onclick="openModule('characters')">Civilian Module</button>

<button onclick="openModule('vehicles')">Vehicles</button>

<button onclick="openModule('leo')">Police Terminal</button>

</nav>


<div class="container">

<!-- DASHBOARD -->

<div id="dashboard" class="module active">

<h1>Dashboard</h1>

<div class="stats">

<div class="stat">Tickets<br><span id="statTickets">0</span></div>

<div class="stat">Vehicles<br><span id="statVehicles">0</span></div>

<div class="stat">Firearm License<br><span id="statFirearm">NONE</span></div>

</div>

</div>


<!-- CHARACTER CREATION -->

<div id="characters" class="module">

<h1>Create Character</h1>

<div class="card">

<input id="charName" placeholder="Full Name">

<input id="charDOB" type="date">

<button onclick="createCharacter()">Create Character</button>

</div>


<h2>Your Characters</h2>

<div id="characterList"></div>

</div>


<!-- CHARACTER PROFILE -->

<div id="profile" class="module">

<h1 id="profileName"></h1>

<div class="card">

DOB: <span id="profileDOB"></span>

</div>


<div class="stats">

<div class="stat">
Vehicles
<span id="vehicleCount">0</span>
</div>

<div class="stat">
Citations
<span id="citationCount">0</span>
</div>

<div class="stat">
Firearm License
<span id="firearmStatus">NONE</span>
</div>

</div>

</div>


<!-- VEHICLES -->

<div id="vehicles" class="module">

<h1>Register Vehicle</h1>

<div class="card">

<input id="vehModel" placeholder="Vehicle Model">

<input id="vehPlate" placeholder="Plate">

<button onclick="addVehicle()">Register Vehicle</button>

</div>

</div>


<!-- POLICE -->

<div id="leo" class="module">

<h1>Police Search</h1>

<div class="card">

<input id="searchName" placeholder="Search Name">

<button onclick="searchPlayer()">Search</button>

<table>

<tr>
<th>Name</th>
<th>License</th>
<th>Status</th>
</tr>

<tbody id="results"></tbody>

</table>

</div>

</div>

</div>

</body>
</html>
