<!DOCTYPE html>
<html>
<head>

<title>Golden State RP DMV Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#f4f6f9;
color:#222;
}

/* HEADER */

header{
background:#1b1f24;
color:white;
padding:15px 30px;
display:flex;
align-items:center;
justify-content:space-between;
}

header h2{
margin:0;
font-weight:600;
}

/* NAV */

.nav{
background:#e9ecef;
padding:10px 30px;
border-bottom:1px solid #d0d0d0;
}

.nav button{
background:none;
border:none;
margin-right:20px;
font-size:15px;
cursor:pointer;
}

.nav button:hover{
color:#007bff;
}

/* MAIN */

.container{
padding:40px;
}

/* STAT CARDS */

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:20px;
}

.stat-card{
background:#1e73d8;
color:white;
padding:25px;
border-radius:6px;
text-align:center;
}

.stat-card h1{
margin:10px 0;
font-size:40px;
}

/* CONTENT CARDS */

.card{
background:white;
padding:25px;
border-radius:6px;
margin-top:30px;
border:1px solid #ddd;
}

/* INPUTS */

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button.action{
background:#1e73d8;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:4px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#1e73d8;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.module{
display:none;
}

.module.active{
display:block;
}

</style>

<script>

/* MODULE SWITCH */

function openModule(name){

let modules=document.getElementsByClassName("module")

for(let m of modules){
m.classList.remove("active")
}

document.getElementById(name).classList.add("active")

}

/* CHARACTER SYSTEM */

function createCharacter(){

let name=document.getElementById("charName").value
let dob=document.getElementById("charDOB").value

if(name=="" || dob==""){
alert("Fill out character info")
return
}

let characters=JSON.parse(localStorage.getItem("gsrpCharacters")) || []

characters.push({
name:name,
dob:dob
})

localStorage.setItem("gsrpCharacters",JSON.stringify(characters))

loadCharacters()

}

function loadCharacters(){

let characters=JSON.parse(localStorage.getItem("gsrpCharacters")) || []

let list=document.getElementById("characterList")

list.innerHTML=""

characters.forEach(c=>{

list.innerHTML+=`
<tr>
<td>${c.name}</td>
<td>${c.dob}</td>
</tr>
`

})

}

/* LEO SEARCH */

function searchPlayer(){

let name=document.getElementById("searchName").value

document.getElementById("results").innerHTML=`
<tr>
<td>${name}</td>
<td>Class C</td>
<td>Valid</td>
<td>2</td>
<td>
<button onclick="alert('License Suspended')">Suspend</button>
<button onclick="alert('License Revoked')">Revoke</button>
</td>
</tr>
`

}

window.onload=loadCharacters

</script>

</head>

<body>

<header>

<h2>Golden State RP DMV System</h2>

<div>Government Portal</div>

</header>

<div class="nav">

<button onclick="openModule('dashboard')">Home</button>
<button onclick="openModule('characters')">Civilian Module</button>
<button onclick="openModule('vehicles')">Vehicle Registry</button>
<button onclick="openModule('leo')">Police Terminal</button>

</div>

<div class="container">

<!-- DASHBOARD -->

<div id="dashboard" class="module active">

<h2>Dashboard Overview</h2>

<div class="stats">

<div class="stat-card">
Issued Tickets
<h1>4</h1>
</div>

<div class="stat-card">
Arrests
<h1>0</h1>
</div>

<div class="stat-card">
Registered Vehicles
<h1>12</h1>
</div>

<div class="stat-card">
Registered Firearms
<h1>3</h1>
</div>

</div>

</div>


<!-- CHARACTERS -->

<div id="characters" class="module">

<h2>Create Character</h2>

<div class="card">

<input id="charName" placeholder="Full Name">
<input id="charDOB" type="date">

<button class="action" onclick="createCharacter()">Create Character</button>

</div>

<div class="card">

<h3>Your Characters</h3>

<table>

<tr>
<th>Name</th>
<th>DOB</th>
</tr>

<tbody id="characterList"></tbody>

</table>

</div>

</div>


<!-- VEHICLES -->

<div id="vehicles" class="module">

<h2>Vehicle Registration</h2>

<div class="card">

<input placeholder="Owner Name">
<input placeholder="Vehicle Model">
<input placeholder="Plate Number">

<button class="action">Register Vehicle</button>

</div>

</div>


<!-- LEO -->

<div id="leo" class="module">

<h2>Law Enforcement Terminal</h2>

<div class="card">

<input id="searchName" placeholder="Search Player Name">

<button class="action" onclick="searchPlayer()">Search</button>

<table>

<tr>
<th>Name</th>
<th>License</th>
<th>Status</th>
<th>Vehicles</th>
<th>Actions</th>
</tr>

<tbody id="results"></tbody>

</table>

</div>

</div>

</div>

</body>
</html>
